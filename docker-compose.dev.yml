version: "3.9"

services:
  backend:
    build: ./backend
    working_dir: /app
    command: npm run start
    volumes:
      - ./backend:/app
      - /app/node_modules
    ports:
      - "5001:5000"
    env_file:
      - ./backend/.env

  frontend:
    build: ./frontend
    working_dir: /app
    command: npm run dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3001:3000"
    env_file:
      - ./frontend/.env.local
    depends_on:
      - backend